name: Deploy wireframe (GitHub Pages)

# Publica o export estatico do frontend no GitHub Pages a cada push na master.
# Tambem pode ser disparado manualmente em Actions (workflow_dispatch).
on:
  push:
    branches: [master]
  workflow_dispatch:

# Permissoes minimas para o deploy-pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Garante um deploy por vez; nao cancela um deploy em andamento.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build (export estatico)
        run: pnpm --filter frontend build
        env:
          # Site servido sob /<repo> no Pages.
          PAGES_BASE_PATH: /bbbrindes

      - name: Evita processamento Jekyll
        run: touch frontend/out/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
